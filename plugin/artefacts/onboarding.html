<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workroom — Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Ground / Base Tones */
      --ink: #F5F1EA;
      --ink-dim: #A8A29A;
      --ink-faint: #5F5B54;
      --ink-whisper: #2A2825;
      --ground: #0A0A0A;
      --ground-raised: #131211;
      --ground-sunken: #060605;
      /* Accent & Interaction */
      --accent: #E8623D;
      --accent-ink: #0A0A0A;
      --accent-glow: rgba(232, 98, 61, 0.18);
      --accent-dim: #A84426;
      /* Semantic Colors */
      --ok: #7EA876;
      --warn: #D4A24E;
      --bad: #B8554A;
      /* Typography Families */
      --f-display: "Instrument Serif", "Times New Roman", serif;
      --f-sans: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --f-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
      /* Geometric Scale */
      --radius-sm: 4px;
      --radius: 8px;
      --radius-lg: 14px;
      --border: 1px solid var(--ink-whisper);
      /* Layout Scale */
      --gutter: 32px;
      --maxw: 1280px;
      /* Motion & Easing */
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    [data-theme="light"] {
      --ink: #17140F;
      --ink-dim: #5F5B54;
      --ink-faint: #8C8880;
      --ink-whisper: #E3DED4;
      --ground: #F5F1EA;
      --ground-raised: #FBF8F2;
      --ground-sunken: #EEE8DC;
      --accent-ink: #F5F1EA;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--ground);
      color: var(--ink);
      font-family: var(--f-sans);
      font-size: 16px;
      line-height: 1.55;
      font-feature-settings: "ss01", "ss02", "cv01";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .wizard {
      display: flex;
      min-height: 100vh;
      gap: var(--gutter);
      padding: var(--gutter);
      max-width: var(--maxw);
      margin: 0 auto;
    }

    .wizard-nav {
      width: 200px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 28px;
      padding-top: 12px;
    }

    .step {
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      padding-left: 28px;
    }

    .step::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--ink-whisper);
      background: var(--ground);
      transition: all 240ms var(--ease-out);
    }

    .step.active::before {
      border-color: var(--accent);
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .step.done::before {
      content: "✓";
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-ink);
      font-size: 12px;
      font-weight: 700;
      border-color: var(--ok);
      background: var(--ok);
      box-shadow: 0 0 8px rgba(126, 168, 118, 0.3);
    }

    .step-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      transition: color 240ms var(--ease-out);
    }

    .step.active .step-label {
      color: var(--accent);
    }

    .step.done .step-label {
      color: var(--ok);
    }

    .step-hint {
      font-size: 12px;
      color: var(--ink-faint);
      line-height: 1.4;
    }

    .wizard-main {
      flex: 1;
      min-width: 0;
    }

    .content-pane {
      background: var(--ground-raised);
      border: var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      display: none;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 300ms var(--ease-out), transform 300ms var(--ease-out);
    }

    .content-pane.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    h1 {
      font-family: var(--f-display);
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      color: var(--ink);
    }

    h2 {
      font-family: var(--f-display);
      font-size: 20px;
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin: 24px 0 12px;
      color: var(--ink);
    }

    .subtitle {
      font-size: 14px;
      color: var(--ink-dim);
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .role-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    @media (max-width: 960px) {
      .role-grid { grid-template-columns: 1fr; }
    }

    .role-btn {
      background: var(--ground-sunken);
      border: var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      transition: all 240ms var(--ease-out);
    }

    .role-btn:hover {
      border-color: var(--accent);
      background: var(--ground-raised);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .role-btn.selected {
      border-color: var(--accent);
      background: rgba(232, 98, 61, 0.08);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .role-btn-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      display: block;
      margin-bottom: 4px;
    }

    .role-btn-desc {
      font-size: 12px;
      color: var(--ink-dim);
    }

    .connector-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .connector-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      background: var(--ground-sunken);
      border: var(--border);
      border-radius: var(--radius);
      transition: all 240ms var(--ease-out);
    }

    .connector-item.connected {
      background: rgba(126, 168, 118, 0.08);
      border-color: var(--ok);
    }

    .connector-item.loading {
      opacity: 0.6;
    }

    .connector-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      border-radius: 50%;
      background: var(--ground);
    }

    .connector-item.connected .connector-icon {
      background: var(--ok);
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
    }

    .connector-info {
      flex: 1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .connector-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .connector-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
    }

    .connector-status {
      font-size: 12px;
      color: var(--ink-faint);
    }

    .connector-item.connected .connector-status {
      color: var(--ok);
    }

    .connector-action {
      background: var(--accent);
      color: var(--accent-ink);
      border: none;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 240ms var(--ease-out);
      white-space: nowrap;
    }

    .connector-action:hover {
      box-shadow: 0 8px 20px var(--accent-glow);
      transform: translateY(-1px);
    }

    .connector-action:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .routine-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }

    @media (max-width: 960px) {
      .routine-grid { grid-template-columns: 1fr; }
    }

    .routine-tile {
      background: var(--ground-sunken);
      border: var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all 240ms var(--ease-out);
      position: relative;
      opacity: 0.5;
    }

    .routine-tile.enabled {
      opacity: 1;
      cursor: pointer;
    }

    .routine-tile.enabled:hover {
      border-color: var(--accent);
      background: var(--ground-raised);
      box-shadow: 0 8px 24px var(--accent-glow);
      transform: translateY(-2px);
    }

    .routine-tile.selected {
      border-color: var(--accent);
      background: rgba(232, 98, 61, 0.08);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .routine-disabled-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      border-radius: var(--radius);
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 8px;
    }

    .routine-tile.enabled .routine-disabled-overlay {
      display: none;
    }

    .missing-badge {
      background: var(--bad);
      color: var(--ink);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
    }

    .routine-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .routine-desc {
      font-size: 12px;
      color: var(--ink-dim);
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .routine-connectors {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .connector-pill {
      background: var(--ground);
      color: var(--ink-faint);
      font-size: 11px;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      font-family: var(--f-mono);
    }

    .routine-tile.enabled .connector-pill {
      background: rgba(232, 98, 61, 0.12);
      color: var(--accent);
    }

    .cta-row {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 28px;
      padding-top: 20px;
      border-top: var(--border);
    }

    button {
      font: inherit;
      cursor: pointer;
      border: none;
      border-radius: var(--radius);
      transition: all 240ms var(--ease-out);
    }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-ink);
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 0 0 1px var(--accent), 0 10px 30px -10px var(--accent-glow);
    }

    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 0 0 1px var(--accent), 0 14px 40px -10px var(--accent-glow), 0 0 60px -10px var(--accent-glow);
      transform: translateY(-1px);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-ghost {
      color: var(--ink);
      border: 1px solid var(--ink-whisper);
      background: transparent;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
    }

    .btn-ghost:hover:not(:disabled) {
      border-color: var(--ink-faint);
      background: var(--ground-raised);
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--ink-faint);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: -1px;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 820px) {
      .wizard {
        flex-direction: column;
        gap: 24px;
      }
      .wizard-nav {
        width: 100%;
        flex-direction: row;
        justify-content: flex-start;
        gap: 40px;
        padding-top: 0;
        border-bottom: var(--border);
        padding-bottom: 20px;
      }
      .content-pane {
        padding: 28px;
      }
    }
  </style>
</head>
<body>

<div class="wizard">
  <!-- Left Navigation —— Step Indicator -->
  <nav class="wizard-nav">
    <div class="step active" data-step="1">
      <div class="step-label">Who you are</div>
      <div class="step-hint">Choose your role</div>
    </div>
    <div class="step" data-step="2">
      <div class="step-label">Your tools</div>
      <div class="step-hint">Connect essentials</div>
    </div>
    <div class="step" data-step="3">
      <div class="step-label">Your routine</div>
      <div class="step-hint">Pick your first</div>
    </div>
  </nav>

  <!-- Right Content Pane -->
  <div class="wizard-main">
    <!-- Step 1: Role Selection -->
    <div class="content-pane active" data-pane="1">
      <h1>Who you are</h1>
      <p class="subtitle">Workroom tailors everything to your role — Pip's nudges, your tool priority, your learning path.</p>

      <div class="role-grid" id="role-grid">
        <button class="role-btn" data-role="sales">
          <div class="role-btn-label">Sales</div>
          <div class="role-btn-desc">Pipeline, forecasting, deals</div>
        </button>
        <button class="role-btn" data-role="ops">
          <div class="role-btn-label">Operations</div>
          <div class="role-btn-desc">Status, vendors, processes</div>
        </button>
        <button class="role-btn" data-role="finance">
          <div class="role-btn-label">Finance</div>
          <div class="role-btn-desc">Invoicing, expenses, books</div>
        </button>
        <button class="role-btn" data-role="marketing">
          <div class="role-btn-label">Marketing</div>
          <div class="role-btn-desc">Campaigns, content, reporting</div>
        </button>
        <button class="role-btn" data-role="support">
          <div class="role-btn-label">Support</div>
          <div class="role-btn-desc">Triage, replies, KB</div>
        </button>
        <button class="role-btn" data-role="founder">
          <div class="role-btn-label">Founder</div>
          <div class="role-btn-desc">Daily brief, decisions, review</div>
        </button>
        <button class="role-btn" data-role="engineering">
          <div class="role-btn-label">Engineering</div>
          <div class="role-btn-desc">Issues, PRs, planning</div>
        </button>
      </div>

      <div class="cta-row">
        <button class="btn-primary" id="step1-next" disabled>Continue →</button>
      </div>
    </div>

    <!-- Step 2: Tool Connection -->
    <div class="content-pane" data-pane="2">
      <h1>Your tools</h1>
      <p class="subtitle" id="step2-subtitle">—</p>

      <div class="connector-list" id="connector-list"></div>

      <div class="cta-row">
        <button class="btn-ghost" id="step2-back">← Back</button>
        <button class="btn-primary" id="step2-next">Continue →</button>
      </div>
    </div>

    <!-- Step 3: Routine Selection -->
    <div class="content-pane" data-pane="3">
      <h1>Your first routine</h1>
      <p class="subtitle">Pick something to start with. You can add more anytime.</p>

      <div class="routine-grid" id="routine-grid"></div>

      <div class="cta-row">
        <button class="btn-ghost" id="step3-back">← Back</button>
        <button class="btn-primary" id="step3-done">Done!</button>
      </div>
    </div>
  </div>
</div>

<script>
  // State management
  window.state = {
    selectedRole: null,
    connectedTools: [],
    selectedRoutine: null,
    currentStep: 1,
  };

  // Role → priority connector order mapping
  const ROLE_CONNECTORS = {
    sales: [
      { name: 'Email', icon: '✉️', mcp: 'gmail', desc: 'Read and draft messages' },
      { name: 'HubSpot', icon: '🔷', mcp: 'hubspot', desc: 'CRM pipeline and deals' },
      { name: 'Calendar', icon: '📅', mcp: 'calendar', desc: 'Meetings and scheduling' },
    ],
    ops: [
      { name: 'Email', icon: '✉️', mcp: 'gmail', desc: 'Read and draft messages' },
      { name: 'Calendar', icon: '📅', mcp: 'calendar', desc: 'Meetings and scheduling' },
      { name: 'Linear', icon: '▭', mcp: 'linear', desc: 'Project tracking' },
    ],
    finance: [
      { name: 'Email', icon: '✉️', mcp: 'gmail', desc: 'Read and draft messages' },
      { name: 'QuickBooks', icon: '📊', mcp: 'quickbooks', desc: 'Accounting and ledger' },
      { name: 'Sheets', icon: '📈', mcp: 'sheets', desc: 'Spreadsheets and analysis' },
    ],
    marketing: [
      { name: 'Email', icon: '✉️', mcp: 'gmail', desc: 'Read and draft messages' },
      { name: 'Notion', icon: '📝', mcp: 'notion', desc: 'Docs and knowledge base' },
      { name: 'Google Analytics', icon: '📊', mcp: 'analytics', desc: 'Traffic and metrics' },
    ],
    support: [
      { name: 'Zendesk', icon: '🎫', mcp: 'zendesk', desc: 'Support tickets' },
      { name: 'Email', icon: '✉️', mcp: 'gmail', desc: 'Read and draft messages' },
      { name: 'Notion', icon: '📝', mcp: 'notion', desc: 'Knowledge base' },
    ],
    founder: [
      { name: 'Email', icon: '✉️', mcp: 'gmail', desc: 'Read and draft messages' },
      { name: 'Calendar', icon: '📅', mcp: 'calendar', desc: 'Meetings and scheduling' },
      { name: 'Slack', icon: '💬', mcp: 'slack', desc: 'Team messages' },
    ],
    engineering: [
      { name: 'Linear', icon: '▭', mcp: 'linear', desc: 'Issue tracking' },
      { name: 'GitHub', icon: '🐙', mcp: 'github', desc: 'Code and PRs' },
      { name: 'Slack', icon: '💬', mcp: 'slack', desc: 'Team messages' },
    ],
  };

  // Placeholder routines — TODO: load from templates/routines.json once Agent E ships it
  const ROLE_ROUTINES = {
    sales: [
      { id: 'r-s-1', title: 'Weekly pipeline summary', desc: 'Auto-draft from CRM + calendar every Friday.', connectors: ['HubSpot', 'Calendar'] },
      { id: 'r-s-2', title: 'Cold outreach personaliser', desc: 'Per-prospect first line from LinkedIn + site.', connectors: ['Email', 'LinkedIn'] },
      { id: 'r-s-3', title: 'Lost-deal post-mortem', desc: 'Structured reason + lessons per deal.', connectors: ['HubSpot', 'Email'] },
      { id: 'r-s-4', title: 'Call-note tidier', desc: 'Rough notes → CRM-ready summary.', connectors: ['HubSpot'] },
    ],
    ops: [
      { id: 'r-o-1', title: 'Monday status auto-draft', desc: 'From last week activity to a brief.', connectors: ['Slack', 'Linear', 'Notion'] },
      { id: 'r-o-2', title: 'Meeting notes tidier', desc: 'Raw notes → decisions + owners.', connectors: ['Calendar', 'Notion'] },
      { id: 'r-o-3', title: 'Cross-team ask router', desc: 'Classify and route shared-inbox requests.', connectors: ['Email', 'Slack'] },
    ],
    finance: [
      { id: 'r-f-1', title: 'Expense auto-categoriser', desc: 'Receipts parsed and filed as they land.', connectors: ['Email', 'QuickBooks'] },
      { id: 'r-f-2', title: 'Invoice drafter', desc: 'From a line to a proper invoice.', connectors: ['QuickBooks'] },
      { id: 'r-f-3', title: 'Bank reconciliation helper', desc: 'Matches transactions, flags odd ones.', connectors: ['QuickBooks'] },
    ],
    marketing: [
      { id: 'r-m-1', title: 'Campaign brief first-draft', desc: 'From a one-liner to a working brief.', connectors: ['Notion', 'Google Drive'] },
      { id: 'r-m-2', title: 'Subject-line generator', desc: 'Ten options graded for your audience.', connectors: ['Email'] },
    ],
    support: [
      { id: 'r-sp-1', title: 'Ticket triage + routing', desc: 'Urgency tag, route, draft reply — ready for review.', connectors: ['Zendesk', 'Email'] },
      { id: 'r-sp-2', title: 'Known-issue matcher', desc: 'Link tickets to existing resolutions.', connectors: ['Zendesk', 'Notion'] },
    ],
    founder: [
      { id: 'r-fo-1', title: 'Morning brief', desc: 'Yesterday, today, biggest risk. 7am daily.', connectors: ['Calendar', 'Slack', 'Linear'] },
      { id: 'r-fo-2', title: 'Decision log keeper', desc: 'Captures and structures decisions.', connectors: ['Slack', 'Notion'] },
    ],
    engineering: [
      { id: 'r-e-1', title: 'PR summary drafter', desc: 'Changelog → a human-readable summary.', connectors: ['GitHub'] },
      { id: 'r-e-2', title: 'Issue triage auto-tag', desc: 'Urgency and component from issue description.', connectors: ['Linear'] },
    ],
  };

  // DOM helpers
  function $(sel) { return document.querySelector(sel); }
  function $$(sel) { return document.querySelectorAll(sel); }

  // Step navigation
  function goToStep(stepNum) {
    window.state.currentStep = stepNum;
    // Hide all panes
    $$('.content-pane').forEach(p => p.classList.remove('active'));
    $$('.step').forEach(s => {
      s.classList.remove('active', 'done');
      const num = parseInt(s.dataset.step);
      if (num < stepNum) s.classList.add('done');
      if (num === stepNum) s.classList.add('active');
    });
    // Show current pane
    $(`[data-pane="${stepNum}"]`).classList.add('active');
  }

  // Step 1: Role selection
  $$('.role-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.role-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      window.state.selectedRole = btn.dataset.role;
      $('#step1-next').disabled = false;
    });
  });

  $('#step1-next').addEventListener('click', () => {
    populateStep2();
    goToStep(2);
  });

  // Step 2: Tool connection
  function populateStep2() {
    const role = window.state.selectedRole;
    const connectors = ROLE_CONNECTORS[role] || [];
    const subtitle = `Let's connect the essentials for ${role}. Start with ${connectors[0]?.name || 'your tools'}.`;
    $('#step2-subtitle').textContent = subtitle;

    const list = $('#connector-list');
    list.innerHTML = '';

    connectors.forEach((conn, idx) => {
      const item = document.createElement('div');
      item.className = 'connector-item';
      item.innerHTML = `
        <div class="connector-icon">${conn.icon}</div>
        <div class="connector-info">
          <div class="connector-label">
            <div class="connector-name">${conn.name}</div>
            <div class="connector-status">Ready to connect</div>
          </div>
          <button class="connector-action" data-connector="${conn.name}">Connect</button>
        </div>
      `;
      list.appendChild(item);

      item.querySelector('.connector-action').addEventListener('click', (e) => {
        e.target.disabled = true;
        e.target.textContent = '...';
        // Simulate connection delay
        setTimeout(() => {
          item.classList.add('connected');
          item.querySelector('.connector-status').textContent = '✓ Connected';
          e.target.style.display = 'none';
          window.state.connectedTools.push(conn.name);
          // Mark step 2 as done after 2 connections or when user clicks next
          if (window.state.connectedTools.length >= 2) {
            $('#step2-next').disabled = false;
          }
        }, 800);
      });
    });

    // Allow proceeding with at least one connection, or skip
    $('#step2-next').disabled = false;
  }

  $('#step2-back').addEventListener('click', () => goToStep(1));
  $('#step2-next').addEventListener('click', () => {
    populateStep3();
    goToStep(3);
  });

  // Step 3: Routine selection
  function populateStep3() {
    const role = window.state.selectedRole;
    const routines = ROLE_ROUTINES[role] || [];
    const grid = $('#routine-grid');
    grid.innerHTML = '';

    routines.forEach(routine => {
      const tile = document.createElement('button');
      tile.className = 'routine-tile';

      // Determine if enabled (all connectors connected)
      const allConnected = routine.connectors.every(c => window.state.connectedTools.includes(c));
      if (allConnected) tile.classList.add('enabled');

      const missingConnectors = routine.connectors.filter(c => !window.state.connectedTools.includes(c));

      tile.innerHTML = `
        <div class="routine-title">${routine.title}</div>
        <div class="routine-desc">${routine.desc}</div>
        <div class="routine-connectors">
          ${routine.connectors.map(c => `<span class="connector-pill">${c}</span>`).join('')}
        </div>
        ${missingConnectors.length > 0 ? `<div class="routine-disabled-overlay"><span class="missing-badge">Missing: ${missingConnectors.join(', ')}</span></div>` : ''}
      `;

      if (allConnected) {
        tile.addEventListener('click', () => {
          $$('.routine-tile').forEach(t => t.classList.remove('selected'));
          tile.classList.add('selected');
          window.state.selectedRoutine = routine.id;
        });
      }

      grid.appendChild(tile);
    });
  }

  $('#step3-back').addEventListener('click', () => goToStep(2));
  $('#step3-done').addEventListener('click', () => {
    // Notify parent (skill) that onboarding is complete
    if (window.parent && window.parent.postMessage) {
      window.parent.postMessage({
        type: 'workroom:onboarding:complete',
        role: window.state.selectedRole,
        connectedTools: window.state.connectedTools,
        selectedRoutine: window.state.selectedRoutine,
      }, '*');
    }
    // Show completion state
    goToStep(3);
    const pane = $('[data-pane="3"]');
    const cta = pane.querySelector('.cta-row');
    cta.innerHTML = '<p style="color: var(--ok); font-weight: 500;">✓ Ready to go! Check the chat for next steps.</p>';
  });

  // Fallback: window.cowork.callMcpTool stub for preview mode
  if (!window.cowork) {
    window.cowork = {
      callMcpTool: async (toolName, args) => {
        console.log('MCP tool called (preview):', toolName, args);
        return { content: [], isError: false };
      },
    };
  }
</script>

</body>
</html>
